<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adarsha Mohit Sahu</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0a66c2; /* Professional LinkedIn Blue */
    --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
  }
  
  body { 
    font-family: 'Inter', sans-serif; 
    text-align: center; 
    background: var(--bg-gradient);
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  
  .container { 
    width: 100%;
    max-width: 380px; 
    background: var(--card-bg); 
    padding: 40px 30px; 
    border-radius: 24px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
  }
  
  /* Adds a sleek initial avatar since we aren't using the VCF photo */
  .avatar {
    width: 88px;
    height: 88px;
    background: linear-gradient(135deg, #0a66c2, #3b82f6);
    color: white;
    font-size: 32px;
    font-weight: 700;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 4px 12px rgba(10, 102, 194, 0.3);
  }
  
  h1 { margin: 0 0 8px; color: var(--text-main); font-size: 24px; font-weight: 700; }
  
  p { color: var(--text-muted); margin: 0 0 32px; font-size: 15px; line-height: 1.5; }
  
  .link-btn { 
    display: block; 
    width: 100%;
    box-sizing: border-box;
    margin: 12px 0; 
    padding: 14px 20px;
    background-color: #f9fafb;
    color: var(--text-main); 
    text-decoration: none; 
    font-weight: 600; 
    border-radius: 12px;
    border: 1px solid #e5e7eb;
