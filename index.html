<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivangee Chakraborty</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0a66c2; 
    --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
  }
  
  body { 
    font-family: 'Inter', sans-serif; 
    text-align: center; 
    background: var(--bg-gradient);
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  
  .container { 
    width: 100%;
    max-width: 380px; 
    background: var(--card-bg); 
    padding: 40px 30px; 
    border-radius: 24px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
  }
  
  .profile-photo {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background-color: var(--primary);
    color: white;
    font-size: 40px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 4px 12px rgba(10, 102, 194, 0.3);
    border: 3px solid white;
    object-fit: cover;
  }
  
  h1 { margin: 0 0 8px; color: var(--text-main); font-size: 24px; font-weight: 700; }
  
  p { color: var(--text-muted); margin: 0 0 32px; font-size: 15px; line-height: 1.5; }
  
  .link-btn { 
    display: block; 
    width: 100%;
    box-sizing: border-box;
    margin: 12px 0; 
    padding: 14px 20px;
    background-color: #f9fafb;
    color: var(--text-main); 
    text-decoration: none; 
    font-weight: 600; 
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    transition: all 0.2s ease;
  }
  
  .link-btn:hover { 
    background-color: #f3f4f6;
    border-color: #d1d5db;
    transform: translateY(-2px);
  }
  
  .save-btn { 
    display: block;
    width: 100%;
    box-sizing: border-box;
    background-color: var(--primary); 
    color: white; 
    padding: 16px 20px; 
    text-decoration: none; 
    border-radius: 12px; 
    font-weight: 700; 
    margin-top: 32px; 
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(10, 102, 194, 0.2);
  }
  
  .save-btn:hover { 
    background-color: #004182; 
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(10, 102, 194, 0.3);
  }
</style>
</head>
<body>

<div class="container">
  <div class="profile-photo">SC</div>
  <h1>Shivangee Chakraborty</h1>
  <p>Manager HR<br>Godrej Consumer Products Limited</p>
  
  <a href="https://www.linkedin.com/in/shivangeechakraborty" class="link-btn">Connect on LinkedIn</a>
  <a href="tel:+919713043407" class="link-btn">Call: +91 97130 43407</a>
  
  <a href="Shivangee_Chakraborty.vcf" download class="save-btn">Save Contact</a>
</div>

</body>
</html>
